<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Measurement Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c3483">
</head>
<body>
  <!-- test2 -->

  <h1>Measurement Tracker</h1>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
    <div id="dateAndMeasurement" style="display:flex; align-items:center; gap:12px;">
      <div id="todayDate" style="font-size:14px; color:#aaa; font-weight:600;"></div>
    </div>
    <button id="calendarBtn"
      style="margin-left:auto; background:#6c3483; color:#fff; border-radius:8px; padding:12px 20px; font-size:18px; border:none; cursor:pointer;">📅</button>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="input-group">
      <label>Weight (lbs)</label>
      <input id="weight">
    </div>

    <div class="input-group">
      <label>Forearms (in)</label>
      <input id="forearms">
    </div>

    <div class="input-group">
      <label>Arms (in)</label>
      <input id="arms">
    </div>

    <div class="input-group">
      <label>Chest (in)</label>
      <input id="chest">
    </div>

    <div class="input-group">
      <label>Shoulders (in)</label>
      <input id="shoulders">
    </div>

    <div class="input-group">
      <label>Waist (in)</label>
      <input id="waist">
    </div>

    <div class="input-group">
      <label>Butt (in)</label>
      <input id="butt">
    </div>

    <button class="save full-width" onclick="saveMeasurement()">Save</button>
  </div>

  <!-- History -->
  <h2>History</h2>
  <div id="historyContainer"></div>

  <!-- Calendar Modal -->
  <div id="calendarModal" class="calendar-modal"div id="calendarModal"
        style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000a; z-index:1000; justify-content:center; align-items:center;">
    <div class="calendar-modal-content">
      <div id="closeCalendarModal" class="modal-close">✕</div>
      <div id="fullCalendar"></div>
    </div>
  </div>

  <!-- Graph -->
  <h2>Graphs</h2>
  <canvas id="measurementChart"></canvas>

  <script src="script.js"></script>
</body>
</html>
